<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Tutor · La Obra UC</title>
    <!-- Incluir Supabase SDK (Importante hacerlo antes de nuestros scripts) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Variables replicadas de index.html para mantener el diseño */
        :root {
            --font-titles: 'Buckwheat TC', sans-serif;
            --font-body: 'Canva Sans', sans-serif;
            --navy: #133c60;
            --teal: #3498DB;
            --bg: #EEF3FA;
            --white: #FFFFFF;
            --text: #17334F;
            --error: #EF476F;
            --success: #06D6A0;
        }

        @font-face { font-family: 'Buckwheat TC'; src: url('assets/fonts/Buckwheat%20TC%20Rg.otf') format('opentype'); }
        @font-face { font-family: 'Canva Sans'; src: url('assets/fonts/CanvaSans/CanvaSans-Regular.otf') format('opentype'); }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-body), sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        h1, h2, label { font-family: var(--font-titles), sans-serif; text-transform: uppercase; }
        
        .auth-container {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(19, 60, 96, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .auth-logo { 
            text-align: center; margin-bottom: 24px; padding: 20px 14px; 
            background: var(--navy); border-radius: 12px; 
            display: flex; gap: 14px; justify-content: center; align-items: center; 
            text-decoration: none; 
        }
        .h-logo { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; filter: drop-shadow(0 4px 10px rgba(0, 0, 0, .2)); }
        .h-logo img, .h-logo svg { width: 44px; height: 44px; display: block; object-fit: contain; mix-blend-mode: screen; }
        .h-tutorias { height: 32px; width: auto; display: block; object-fit: contain; flex-shrink: 0; filter: drop-shadow(0 4px 10px rgba(0, 0, 0, .2)); }
        .h-brand { display: flex; flex-direction: column; justify-content: center; text-align: left; }
        .h-brand span.main { color: var(--white); font-family: var(--font-titles); text-transform: uppercase; letter-spacing: 0.05em; font-size: 16px; font-weight: 800; line-height: 1; }
        .auth-title { text-align: center; color: var(--navy); font-size: 24px; margin-bottom: 24px; }
        
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--navy); letter-spacing: 0.5px; }
        .form-input {
            width: 100%; padding: 12px 16px; border: 2px solid #dde8f5; border-radius: 8px;
            font-size: 15px; transition: border-color 0.2s;
        }
        .form-input:focus { outline: none; border-color: var(--teal); }
        
        .btn {
            width: 100%; padding: 14px; background: var(--navy); color: var(--white);
            border: none; border-radius: 8px; font-family: var(--font-titles); text-transform: uppercase;
            font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s;
            margin-top: 10px;
        }
        .btn:hover { background: #0c2b46; }
        .btn:disabled { background: #5580A8; cursor: not-allowed; }
        
        .auth-links { text-align: center; margin-top: 20px; font-size: 14px; }
        .auth-links a { color: var(--teal); text-decoration: none; font-weight: bold; }
        
        .msg { margin-top: 15px; font-size: 14px; text-align: center; display: none; padding: 10px; border-radius: 6px; }
        .msg.error { background: #ffeeef; color: var(--error); display: block; }
        .msg.success { background: #e6fff7; color: var(--success); display: block; }
    </style>
</head>
<body>

<div class="auth-container">
    <a href="index.html" class="auth-logo">
        <div class="h-logo">
            <img src="assets/Logo.png" alt="Logo La Obra UC" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" style="display:none"><polyline points="9,52 50,12 91,52 91,73" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" /><polyline points="9,52 9,90 68,90" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" /><text x="19" y="70" fill="white" font-weight="800" font-size="18" font-family="'Barlow Condensed',sans-serif" letter-spacing="1">LA</text><text x="14" y="87" fill="white" font-weight="800" font-size="18" font-family="'Barlow Condensed',sans-serif" letter-spacing="0.5">OBRA</text></svg>
        </div>
        <img class="h-tutorias" src="assets/Captura de pantalla 2026-03-26 a la(s) 11.43.07 a.m..png" alt="Tutorías">
    </a>
    <h2 class="auth-title">Crear Cuenta</h2>
    
    <form id="signupForm">
        <div class="form-group">
            <label class="form-label" for="nombre_completo">Nombre y Apellido</label>
            <input type="text" id="nombre_completo" class="form-input" required>
        </div>
        
        <div class="form-group">
            <label class="form-label" for="rol">¿Cuál es tu rol?</label>
            <select id="rol" class="form-input" required onchange="toggleStudentField()">
                <option value="tutor" selected>Tutor</option>
                <option value="admin">Administrador</option>
            </select>
        </div>

        <div class="form-group" id="studentGroup">
            <label class="form-label" for="nombre_atutorado">Nombre del Alumno (Atutorado)</label>
            <input type="text" id="nombre_atutorado" class="form-input">
        </div>
        
        <div class="form-group">
            <label class="form-label" for="email">Correo Electrónico</label>
            <input type="email" id="email" class="form-input" required>
        </div>
        
        <div class="form-group">
            <label class="form-label" for="password">Contraseña (Mín. 6 caracteres)</label>
            <input type="password" id="password" class="form-input" required minlength="6">
        </div>
        
        <script>
            function toggleStudentField() {
                const rol = document.getElementById('rol').value;
                const studentGroup = document.getElementById('studentGroup');
                const studentInput = document.getElementById('nombre_atutorado');
                if (rol === 'admin') {
                    studentGroup.style.display = 'none';
                    studentInput.required = false;
                } else {
                    studentGroup.style.display = 'block';
                    studentInput.required = true;
                }
            }
            // Initialize visibility
            window.addEventListener('DOMContentLoaded', toggleStudentField);
        </script>

        <div id="statusMsg" class="msg"></div>
        
        <button type="submit" id="submitBtn" class="btn">Registrarse</button>
    </form>
    
    <div class="auth-links">
        ¿Ya tienes cuenta? <a href="login.html">Inicia Sesión</a>
    </div>
</div>

<script src="scripts/supabase-config.js"></script>
<script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('statusMsg');
        
        const nombre_completo = document.getElementById('nombre_completo').value;
        const nombre_atutorado = document.getElementById('nombre_atutorado').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        btn.disabled = true;
        btn.textContent = 'Registrando...';
        msg.className = 'msg';
        
        try {
            // 1. Sign up user
            const { data, error } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
            });
            
            if (error) throw error;
            
            if (data.user) {
                // 2. Insert into perfiles
                const rol = document.getElementById('rol').value;
                const { error: profileError } = await supabaseClient
                    .from('perfiles')
                    .insert([
                        { 
                            id: data.user.id, 
                            nombre_completo: nombre_completo,
                            nombre_atutorado: rol === 'tutor' ? nombre_atutorado : null,
                            rol: rol
                        }
                    ]);
                    
                if (profileError) throw profileError;
                
                msg.className = 'msg success';
                msg.textContent = '¡Cuenta creada! Redirigiendo...';
                
                setTimeout(() => {
                    window.location.href = rol === 'admin' ? 'portal-admin.html' : 'portal-tutor.html';
                }, 1500);
            } else {
                msg.className = 'msg success';
                msg.textContent = 'Revisa tu correo para confirmar tu cuenta (si tienes confirmación por email activada).';
            }
            
        } catch (error) {
            console.error(error);
            msg.className = 'msg error';
            msg.textContent = error.message;
            btn.disabled = false;
            btn.textContent = 'Registrarse';
        }
    });
</script>
</body>
</html>
